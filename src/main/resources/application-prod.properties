spring.application.name=recommendation-service

# =========================
# Server
# =========================
server.port=8080

# =========================
# Datasource
# =========================
spring.datasource.url=jdbc:postgresql://localhost:5432/recommendations
spring.datasource.username=${DB_USER:}
spring.datasource.password=${DB_PASSWORD:}
application.recommendations-db.url=jdbc:h2:file:./transaction;ACCESS_MODE_DATA=r

# =========================
# JPA
# =========================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

# =========================
# LIQUIBASE
# =========================
spring.liquibase.change-log=classpath:liquibase/changelog-master.yml

# ==========================================
# REDIS & CACHE CONFIGURATION
# ==========================================
# Connection settings for distributed cache storage
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Switching Spring Cache abstraction to Redis provider
spring.cache.type=redis

# TTL (Time to live) default
spring.cache.redis.time-to-live= 10m

# Prevent caching of null values
spring.cache.redis.cache-null-values=false

# =========================
# Logging
# =========================
logging.file.name=/opt/recommendation/logs/app.log
logging.level.root=INFO